name: Public API Development
# only trigger on pull request closed events
on:
  push:
    branches: [ "main" ]
    paths:
      - back/private/**    
jobs:
  build:
    runs-on: ubuntu-latest 
    environment: Production
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
      
    - name: Replace secrets in appsettings
      working-directory:  back/
      run: |        
        sed -i "s|__MONGODB_CONNSTRING__|${{ secrets.MONGODB_CONNSTRING }}|g" Configs/appsettings_dev_bm.json
        sed -i "s|__DREMIO_USER__|${{ secrets.DREMIO_USER }}|g" Configs/appsettings_dev_bm.json
        sed -i "s|__DREMIO_PWD__|${{ secrets.DREMIO_PWD }}|g" Configs/appsettings_dev_bm.json
        sed -i "s|__DREMIO_SERVER__|${{ secrets.DREMIO_SERVER }}|g" Configs/appsettings_dev_bm.json
        sed -i "s|__DREMIO_SERVER_AUTH__|${{ secrets.DREMIO_SERVER_AUTH }}|g" Configs/appsettings_dev_bm.json      
      
    - name: Build the Docker image
      working-directory:  back/
      run: docker build -f private/Dockerfile  --build-arg ENVIRONMENT=prod  -t txalaparta/discodata-private_api_prod:latest .

    - uses: docker/login-action@v3
      name: Login to Docker Hub      
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
    - uses: actions/checkout@v4
    - name: Push
      working-directory: back/private
      run: docker push txalaparta/discodata-private_api_prod:latest

    - uses: actions/checkout@v4
    - name: Remove the Docker image to free space
      working-directory: back
      run: docker image rmi -f txalaparta/discodata-private_api_prod:latest
